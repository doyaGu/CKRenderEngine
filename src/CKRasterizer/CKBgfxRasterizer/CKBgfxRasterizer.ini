# CKBgfxRasterizer configuration
#
# This file uses VxConfiguration sections like CK2_3D.ini.
# Renderer/Backend values: auto, d3d11, d3d12, vulkan, opengl.

<CKBgfxRasterizer>
  <Renderer>
    # Select the bgfx backend. Use "auto" for bgfx platform default selection.
    Backend = auto

    # Used when a context is created without a valid window/client size.
    FallbackWidth = 640
    FallbackHeight = 480
  </Renderer>

  <Readback>
    # Maximum frames to wait for synchronous backbuffer readback.
    TimeoutFrames = 120
  </Readback>

  <Debug>
    # Virtools-facing debug overlay gate.
    Overlay = 0

    <Bgfx>
      Wireframe = 0
      IFH = 0
      Stats = 0
      Text = 0
      Profiler = 0
      All = 0
    </Bgfx>

    <Log>
      # Diagnostic logging gates. Keep these disabled for normal play.
      File = 0
      Trace = 0
      Config = 0
      Textures = 0
      TextureBindings = 0
      Uniforms = 0
      PresentSync = 0
    </Log>
  </Debug>
</CKBgfxRasterizer>
