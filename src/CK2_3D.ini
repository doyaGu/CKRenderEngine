##############################################################################
# CK2_3D Render Engine config file
#
# Runtime options. Defaults match the original Virtools CK2_3D.ini.
##############################################################################

<CK2_3D>
    DisablePerspectiveCorrection = 0
    ForceLinearFog = 0
    ForceSoftware = 0
    DisableFilter = 0
    EnsureVertexShader = 0
    UseIndexBuffers = 0
    DisableDithering = 0
    Antialias = 0
    DisableMipmap = 0
    DisableSpecular = 0
    EnableScreenDump = 0
    EnableDebugMode = 0
    VertexCache = 16
    SortTransparentObjects = 1
    TextureCacheManagement = 1
    TextureVideoFormat = _16_ARGB1555
    SpriteVideoFormat = _16_ARGB1555
</CK2_3D>
